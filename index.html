    <div id="stickyPlayer" class="fixed bottom-0 left-0 w-full bg-a text-white p-3 z-[100] border-t-4 border-v flex justify-between items-center px-6 transform translate-y-full transition-transform duration-500 shadow-2xl">
        <div class="flex items-center gap-4"><img src="https://i.postimg.cc/tJj3sYsx/Logo-Bem-Mais.png" class="h-10"><div><p class="text-[10px] uppercase font-bold text-v leading-none">No ar:</p><p class="text-sm font-bold italic">BEM MAIS 104,7 FM</p></div></div>
        <button onclick="toggleRadio()" class="text-4xl text-v"><i id="stickyPlayIcon" class="fas fa-pause-circle"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const fc = { apiKey: "AIzaSyBYFs-3ixu5QzPnjv-JWbz8G6kNiZ5_raE", authDomain: "bem-mais-noticias.firebaseapp.com", projectId: "bem-mais-noticias", storageBucket: "bem-mais-noticias.firebasestorage.app", messagingSenderId: "789310207840", appId: "1:789310207840:web:c7dcdaf632ab28c6fc1005", measurementId: "G-RFSEDRRS5F" };
        const app = initializeApp(fc); const db = getFirestore(app);

        // LOGICA DE IDENTIFICAÇÃO DE VÍDEO
        function generateVideoHTML(url) {
            // YouTube
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let id = url.includes("v=") ? url.split("v=")[1].split("&")[0] : url.split("/").pop();
                return `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            }
            // Facebook
            if (url.includes("facebook.com")) {
                return `<iframe src="https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(url)}&show_text=0&t=0" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
            }
            // Cloudinary / MP4 Direto
            return `<video controls autoplay muted loop playsinline><source src="${url}" type="video/mp4">Seu navegador não suporta vídeos.</video>`;
        }

        async function fetchVideo() {
            const snap = await getDocs(query(collection(db, "video_destaque"), orderBy("data", "desc"), limit(1)));
            const wrapper = document.getElementById('video-wrapper');
            let url = "https://www.facebook.com/reel/2463040820739971"; // Default
            if(!snap.empty) url = snap.docs[0].data().url;
            wrapper.innerHTML = generateVideoHTML(url);
        }

        async function fetchPromos() {
            const track = document.getElementById('promo-carousel');
            const snap = await getDocs(query(collection(db, "promocoes"), orderBy("data", "desc")));
            if (snap.empty) { track.innerHTML = `<div class="min-w-full"><img src="https://i.postimg.cc/tRSsYBYb/001.png" class="w-full"></div>`; return; }
            track.innerHTML = ""; snap.forEach(doc => { track.innerHTML += `<div class="min-w-full"><img src="${doc.data().imagem}" class="w-full h-auto object-cover"></div>`; });
            if(snap.size > 1) setInterval(() => window.movePromo(1), 5000);
        }

        async function fetchNews() {
            const track = document.getElementById('news-track');
            const snap = await getDocs(query(collection(db, "noticias"), orderBy("data", "desc"), limit(6)));
            track.innerHTML = "";
            snap.forEach(doc => { const d = doc.data(); track.innerHTML += `<div class="min-w-[85%] md:min-w-[31%] bg-white rounded-2xl overflow-hidden shadow-md border-b-4 border-a transition hover:scale-[1.02]"><img src="${d.imagem}" class="w-full h-40 object-cover"><div class="p-4"><h3 class="font-black mt-2 leading-tight text-sm line-clamp-2">${d.titulo}</h3><a href="${d.url || '#'}" target="_blank" class="inline-block mt-4 text-xs font-bold text-a uppercase">Leia mais +</a></div></div>`; });
        }

        fetchVideo(); fetchPromos(); fetchNews();

        let pIdx = 0; window.movePromo = (dir) => { 
            const track = document.getElementById('promo-carousel'); const total = track.children.length;
            pIdx = (pIdx + dir + total) % total; track.style.transform = `translateX(-${pIdx * 100}%)`; 
        };
        let nIdx = 0; window.moveNews = (dir) => { const track = document.getElementById('news-track'); const i = track.children.length; const v = window.innerWidth < 768 ? 1 : 3; if(i <= v) return; nIdx = Math.max(0, Math.min(nIdx + dir, i - v)); track.style.transform = `translateX(-${nIdx * (window.innerWidth < 768 ? 85 : 33.33)}%)`; };
    </script>
    <script>
        const audio = document.getElementById('radioStream');
        function toggleRadio() { if (audio.paused) { audio.play(); document.getElementById('stickyPlayer').classList.remove('translate-y-full'); document.getElementById('stickyPlayIcon').className='fas fa-pause-circle'; } else { audio.pause(); document.getElementById('stickyPlayIcon').className='fas fa-play-circle'; } }
    </script>
